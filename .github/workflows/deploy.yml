name: Deploy

on:
  push:
    branches: [main, staging, 'feature/**']
  workflow_dispatch:

permissions:
  contents: write

# One deploy at a time — queue rather than cancel so no push is lost.
concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve deploy target
        id: target
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          if [ "$BRANCH" = "main" ]; then
            FOLDER="."
            URL="https://pastaluke.github.io/camealotdinkin/"
          elif [ "$BRANCH" = "staging" ]; then
            FOLDER="staging"
            URL="https://pastaluke.github.io/camealotdinkin/staging/"
          else
            SAFE=$(echo "$BRANCH" | sed 's|/|-|g')
            FOLDER="preview/${SAFE}"
            URL="https://pastaluke.github.io/camealotdinkin/preview/${SAFE}/"
          fi
          echo "folder=${FOLDER}" >> $GITHUB_OUTPUT
          echo "url=${URL}"       >> $GITHUB_OUTPUT
          echo "Branch '${BRANCH}' → ${FOLDER}"

      - name: Publish to gh-pages
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          REPO_URL="https://x-access-token:${TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          FOLDER="${{ steps.target.outputs.folder }}"
          PAGES=/tmp/pages

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Clone gh-pages into a temp dir, or create it fresh if it doesn't exist yet.
          if git ls-remote --exit-code --heads "$REPO_URL" gh-pages >/dev/null 2>&1; then
            git clone --depth=1 --branch=gh-pages "$REPO_URL" "$PAGES"
          else
            mkdir "$PAGES"
            git -C "$PAGES" init
            git -C "$PAGES" checkout -b gh-pages
            git -C "$PAGES" remote add origin "$REPO_URL"
          fi

          git -C "$PAGES" config user.name  "github-actions[bot]"
          git -C "$PAGES" config user.email "github-actions[bot]@users.noreply.github.com"

          # Root deploys (main) protect preview/ and staging/ from deletion so
          # feature-branch deployments aren't wiped every time main is pushed.
          if [ "$FOLDER" = "." ]; then
            rsync -a --delete \
              --exclude='.git' --exclude='.github' \
              --filter='protect preview/' \
              --filter='protect staging/' \
              ./ "$PAGES/"
          else
            mkdir -p "$PAGES/$FOLDER"
            rsync -a --delete \
              --exclude='.git' --exclude='.github' \
              ./ "$PAGES/$FOLDER/"
          fi

          touch "$PAGES/.nojekyll"

          git -C "$PAGES" add -A
          if git -C "$PAGES" diff --cached --quiet; then
            echo "Nothing changed — skipping commit."
          else
            git -C "$PAGES" commit -m "deploy: ${{ github.ref_name }} @ ${{ github.sha }}"
            git -C "$PAGES" push origin gh-pages
            echo "✅ Live at ${{ steps.target.outputs.url }}"
          fi
